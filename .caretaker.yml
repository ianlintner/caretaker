# Caretaker configuration for this repository.
# https://github.com/ianlintner/caretaker

memory_store:
  enabled: true
  backend: mongo # use Cosmos DB for MongoDB (set via MONGODB_URL secret)

mongo:
  enabled: true
  mongodb_url_env: MONGODB_URL # GitHub Actions secret → Cosmos DB for MongoDB
  database_name: caretaker
  memory_collection: agent_memory
  audit_collection: audit_log

# Research: autonomous self-merge loop for caretaker-authored PRs.
# - gate_and_merge: caretaker/pr-readiness is a required check AND caretaker
#   merges directly when the PR turns green.
# - auto_approve_caretaker_prs: caretaker submits an APPROVE review on its own
#   PRs once CI is clean and no blocker findings exist, satisfying the
#   required-review gate without a human in the loop.
pr_agent:
  merge_authority:
    mode: gate_and_merge
  review:
    auto_approve_caretaker_prs: true
