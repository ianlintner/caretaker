# .github/maintainer/config.yml
# Dogfood — this repo uses caretaker on itself.
#
# After PR #621 the active server-side dispatcher loads ONLY this file
# (caretaker.github_app.context_factory._CONFIG_PATH). The previous
# .caretaker.yml at the repo root is gone — its memory/mongo and
# autonomy keys are inlined below. Single source of truth.
version: v1

orchestrator:
  schedule: hourly
  summary_issue: true
  dry_run: false

# Persistent agent memory — Cosmos DB for MongoDB via the MONGODB_URL
# secret in GitHub Actions / the backend deployment. Without these
# blocks the active dispatcher would fall back to in-memory state and
# every cross-run insight (causal-event chain, dedupe, intervention
# detection) would reset on each pod restart.
memory_store:
  enabled: true
  backend: mongo

mongo:
  enabled: true
  mongodb_url_env: MONGODB_URL
  database_name: caretaker
  memory_collection: agent_memory
  audit_collection: audit_log

pr_agent:
  enabled: true
  auto_merge:
    copilot_prs: true
    dependabot_prs: true
    human_prs: false
    merge_method: squash
  copilot:
    max_retries: 2
    retry_window_hours: 24
    context_injection: true
  ci:
    flaky_retries: 1
    # Ignore caretaker's own published readiness check when evaluating
    # upstream CI. Otherwise the PR state machine sees it as pending /
    # action_required on every cycle and never transitions to
    # ci_failing, which deadlocks the custom-agent dispatcher against
    # its own gate.
    ignore_jobs:
      - caretaker/pr-readiness
    # When the repo-wide PR CI backlog guard trips, close caretaker-managed PRs
    # instead of asking Copilot to "fix" queue pressure.
    close_managed_prs_on_backlog: true
  # Autonomous self-merge loop for caretaker-authored PRs.
  # - gate_and_merge: caretaker/pr-readiness is a required check AND caretaker
  #   merges directly when the PR turns green.
  # - auto_approve_caretaker_prs: caretaker submits an APPROVE review on its own
  #   PRs once CI is clean and no blocker findings exist, satisfying the
  #   required-review gate without a human in the loop.
  #
  # These keys used to live in the now-removed .caretaker.yml at the repo
  # root. The active server-side dispatcher loads only
  # .github/maintainer/config.yml (see context_factory._CONFIG_PATH), so
  # autonomy regressed silently after PR #621. Inlined here as the single
  # source of truth.
  merge_authority:
    mode: gate_and_merge
  review:
    auto_approve_caretaker_prs: true
    auto_approve_copilot: false
    nitpick_threshold: low

issue_agent:
  enabled: true
  auto_assign_bugs: true
  auto_assign_features: false
  auto_close_stale_days: 30
  auto_close_questions: true
  labels:
    bug: ["bug"]
    feature: ["enhancement", "feature"]
    question: ["question"]

upgrade_agent:
  enabled: false # This IS the central repo — no self-upgrade

devops_agent:
  enabled: true
  target_branch: main
  max_issues_per_run: 3
  dedup_open_issues: true

self_heal_agent:
  enabled: true
  report_upstream: true
  # This IS the upstream caretaker source repo; upstream reporting is suppressed to avoid loops
  is_upstream_repo: true

security_agent:
  enabled: true
  min_severity: medium
  max_issues_per_run: 5
  false_positive_rules: []
  include_dependabot: true
  include_code_scanning: true
  include_secret_scanning: true

dependency_agent:
  enabled: true
  auto_merge_patch: true
  auto_merge_minor: true
  merge_method: squash
  post_digest: true

docs_agent:
  enabled: true
  lookback_days: 7
  changelog_path: CHANGELOG.md
  update_readme: false

stale_agent:
  enabled: true
  stale_days: 60
  close_after: 14
  close_stale_prs: true
  delete_merged_branches: true
  exempt_labels:
    - pinned
    - security
    - security:finding
    - dependencies:major-upgrade
    - caretaker:self-heal
    - devops:build-failure

shepherd:
  # Off by default — flip to true to opt into the PR shepherd loop
  # (dedupe, draft promotion, auto-rebase, stale-dirty reaper).
  # Only runs in the dedicated "shepherd" mode; hourly "full" runs
  # are unchanged.
  enabled: false
  dedupe: true
  promote_drafts: true
  mechanical_fixes: true
  auto_update_branch: true
  stale_dirty_reaper: true
  merge_chain: true
  max_llm_calls_per_run: 3
  stale_dirty_days: 14
  mechanical_fix_rungs:
    - ruff-format
    - ruff-check-fix
  dry_run: false

human_escalation:
  enabled: true
  post_digest_issue: true
  notify_assignees: []

escalation:
  targets: []
  stale_days: 7
  labels: ["maintainer:escalated"]

llm:
  # Route through LiteLLM so any Azure AI Foundry / Azure OpenAI key works.
  # provider: anthropic would require ANTHROPIC_API_KEY which is not used in
  # this fleet — Claude is accessed via Azure AI Foundry (AZURE_AI_API_KEY).
  provider: litellm
  claude_enabled: "true"
  default_model: azure_ai/gpt-4.1-mini
  fallback_models:
    - azure/gpt-4o
  feature_models:
    # Reasoning-heavy features — route to Claude via Azure AI Foundry for
    # prompt-cache benefits (_supports_prompt_cache keys on "claude" substring).
    architectural_review:
      model: azure_ai/claude-sonnet-4-5
      max_tokens: 8000
    principal_architecture_review:
      model: azure_ai/claude-sonnet-4-5
      max_tokens: 8000
    issue_decomposition:
      model: azure_ai/gpt-4.1
      max_tokens: 4000
    # Log grinding — fast + cheap
    ci_log_analysis:
      model: azure_ai/gpt-4.1-mini
      max_tokens: 1500
  claude_features:
    - ci_log_analysis
    - architectural_review
    - issue_decomposition
    - upgrade_impact_analysis
    - principal_architecture_review
    - principal_create_prd
    - refactor_analysis
    - refactor_plan
    - migration_analysis
    - test_skeleton_generation

executor:
  provider: auto
  foundry:
    enabled: true
    model: azure_ai/gpt-4o
    allowed_task_types:
      - LINT_FAILURE
      - REVIEW_COMMENT
    route_same_repo_only: true
