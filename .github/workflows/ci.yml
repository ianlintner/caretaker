name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Hard cap for concurrent + queued PR CI runs across this repo.
  PR_CI_BACKLOG_LIMIT: "8"

jobs:
  queue-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Skip backlog guard outside PRs
        if: github.event_name != 'pull_request'
        run: echo "PR backlog guard only applies to pull_request runs."

      - name: Fail fast when PR CI backlog is too large
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const limit = Number(process.env.PR_CI_BACKLOG_LIMIT || "8");
            if (!Number.isInteger(limit) || limit < 1) {
              core.setFailed(`PR_CI_BACKLOG_LIMIT must be a positive integer, got ${process.env.PR_CI_BACKLOG_LIMIT}`);
              return;
            }

            const activeStatuses = new Set(["queued", "in_progress", "pending", "requested", "waiting"]);
            const activeRuns = [];

            for (let page = 1; page <= 10; page += 1) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "ci.yml",
                event: "pull_request",
                per_page: 100,
                page,
              });

              for (const run of data.workflow_runs) {
                if (run.id === context.runId) {
                  continue;
                }
                if (!activeStatuses.has(run.status)) {
                  continue;
                }

                activeRuns.push(run);
                if (activeRuns.length + 1 > limit) {
                  break;
                }
              }

              if (activeRuns.length + 1 > limit || data.workflow_runs.length < 100) {
                break;
              }
            }

            const totalActiveRuns = activeRuns.length + 1;
            if (totalActiveRuns > limit) {
              const sample = activeRuns
                .slice(0, 5)
                .map((run) => `- #${run.id} (${run.status}) ${run.head_branch}`)
                .join("\n");
              core.setFailed(
                [
                  `CI backlog guard tripped: ${totalActiveRuns} active pull_request CI runs exceeds the repo limit of ${limit}.`,
                  "Failing this run early so caretaker can clean up managed PRs and reduce queue pressure.",
                  sample ? `Other active runs:\n${sample}` : "",
                ]
                  .filter(Boolean)
                  .join("\n\n"),
              );
              return;
            }

            core.info(`CI backlog guard passed: ${totalActiveRuns}/${limit} active pull_request CI runs.`);

  lint:
    needs: queue-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy
        run: mypy src/

  test:
    needs: queue-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --cov=caretaker --cov-report=term-missing --cov-report=xml:coverage.xml --junitxml=test-results.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          if-no-files-found: ignore
          retention-days: 14
