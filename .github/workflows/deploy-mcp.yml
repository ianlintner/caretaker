name: Deploy MCP backend to AKS

# Builds the MCP backend container (admin SPA baked in), pushes it to ACR,
# and rolls out the new image to the configured AKS cluster.
#
# Trigger: manual via workflow_dispatch.  Auto-on-push is intentionally
# disabled — flip the `push` trigger below on once the pipeline is proven.
#
# Required repo configuration:
#   variables:
#     AZURE_TENANT_ID
#     CARETAKER_ACR_NAME                (e.g. "gabby" for gabby.azurecr.io)
#     CARETAKER_AKS_CLUSTER_NAME
#     CARETAKER_AKS_RESOURCE_GROUP
#     CARETAKER_MCP_IMAGE_REPOSITORY    (e.g. "caretaker-mcp")
#     CARETAKER_MCP_NAMESPACE
#   secrets:
#     AZURE_CLIENT_ID                   (Entra app registration, with federated cred for this repo)
#     AZURE_SUBSCRIPTION_ID

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to build. Defaults to the short commit SHA."
        required: false
        type: string
  # Uncomment once the workflow is proven green:
  # push:
  #   branches: [main]

concurrency:
  group: deploy-mcp
  cancel-in-progress: false

permissions:
  id-token: write   # federated OIDC login to Azure
  contents: read

jobs:
  build-and-deploy:
    # Native arm64 runner: AKS nodes are arm64, so amd64 emulation is unnecessary
    # and was exceeding the 30min timeout during QEMU-based multi-arch builds.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="sha-${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using image tag: $TAG"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name "${{ vars.CARETAKER_ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image (arm64, native)
        run: |
          IMAGE="${{ vars.CARETAKER_ACR_NAME }}.azurecr.io/${{ vars.CARETAKER_MCP_IMAGE_REPOSITORY }}:${{ steps.tag.outputs.tag }}"
          docker buildx build \
            -f Dockerfile.mcp \
            --platform linux/arm64 \
            --tag "$IMAGE" \
            --push \
            .
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Get AKS credentials
        uses: azure/aks-set-context@v4
        with:
          cluster-name: ${{ vars.CARETAKER_AKS_CLUSTER_NAME }}
          resource-group: ${{ vars.CARETAKER_AKS_RESOURCE_GROUP }}

      - name: Ensure namespace exists
        run: |
          kubectl get namespace "${{ vars.CARETAKER_MCP_NAMESPACE }}" \
            || kubectl create namespace "${{ vars.CARETAKER_MCP_NAMESPACE }}"

      - name: Apply manifests
        run: |
          # ServiceAccounts and RBAC must exist before the Deployment is
          # (re)created, otherwise the pod fails to start with
          # ``ServiceAccount "caretaker-mcp" not found``.
          kubectl apply \
            -n "${{ vars.CARETAKER_MCP_NAMESPACE }}" \
            -f infra/k8s/caretaker-mcp-serviceaccount.yaml \
            -f infra/k8s/caretaker-agent-worker.yaml

          # `replace --force` deletes and recreates the Deployment to reconcile
          # stale unmanaged fields from a prior manual `kubectl apply` — a
          # regular apply/server-side-apply cannot remove an unmanaged `value`
          # on an env entry that we now declare via `valueFrom`.
          kubectl replace --force \
            -n "${{ vars.CARETAKER_MCP_NAMESPACE }}" \
            -f infra/k8s/caretaker-mcp-deployment.yaml
          kubectl apply \
            -n "${{ vars.CARETAKER_MCP_NAMESPACE }}" \
            -f infra/k8s/caretaker-mcp-service.yaml \
            -f infra/k8s/caretaker-mcp-pdb.yaml \
            -f infra/k8s/redis-statefulset.yaml \
            -f infra/k8s/neo4j-statefulset.yaml

      - name: Update deployment image
        run: |
          kubectl set image \
            -n "${{ vars.CARETAKER_MCP_NAMESPACE }}" \
            deployment/caretaker-mcp \
            mcp-backend="$IMAGE"

      - name: Wait for rollout
        run: |
          kubectl rollout status \
            -n "${{ vars.CARETAKER_MCP_NAMESPACE }}" \
            deployment/caretaker-mcp \
            --timeout=5m

      - name: Summary
        run: |
          echo "### Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: \`$IMAGE\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Namespace: \`${{ vars.CARETAKER_MCP_NAMESPACE }}\`" >> "$GITHUB_STEP_SUMMARY"
          kubectl get pods -n "${{ vars.CARETAKER_MCP_NAMESPACE }}" -l app=caretaker-mcp \
            >> "$GITHUB_STEP_SUMMARY"
