# Caretaker dogfoods on itself via the same thin streaming workflow that
# every consumer repo gets. Webhooks (delivered to the backend's GitHub
# App) are the real-time path; this file exists for:
#
#   - Operator-triggered runs (workflow_dispatch).
#   - Sparse cron-driven webhook-miss recovery.
#
# The backend's in-cluster reconciliation scheduler handles the bulk of
# scheduled work; the cron here is the safety net.
#
# Backend URL is configured at the repo level via the CARETAKER_BACKEND_URL
# variable. No PATs, LLM keys, or COPILOT_PAT are needed in this workflow —
# the backend holds them all.

name: Caretaker

on:
  schedule:
    - cron: "37 */6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode the backend should execute"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - pr-only
          - issue-only
          - upgrade-only
          - devops
          - self-heal
          - security
          - deps
          - docs
          - stale
          - escalation
          - shepherd
          - dry-run

concurrency:
  group: caretaker
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CARETAKER_BACKEND_URL: ${{ vars.CARETAKER_BACKEND_URL }}
      CARETAKER_OIDC_AUDIENCE: ${{ vars.CARETAKER_OIDC_AUDIENCE }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install caretaker (thin client only)
        run: |
          # Match the published-template form so dogfood validates the
          # exact path consumer repos run. PyPI dist name is
          # "caretaker-github"; the console script is `caretaker`.
          pip install --quiet "caretaker-github"

      - name: Stream a backend-executed run
        run: |
          caretaker stream --mode "${{ inputs.mode || 'full' }}"
