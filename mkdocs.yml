site_name: Caretaker
site_description: Autonomous GitHub repository maintenance powered by Copilot
site_url: https://ianlintner.github.io/caretaker/
repo_url: https://github.com/ianlintner/caretaker
repo_name: ianlintner/caretaker
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.top
    - navigation.tabs
    - search.highlight
    - search.suggest

nav:
  - Overview: index.md
  - Getting started: getting-started.md
  - Configuration: configuration.md
  - Agents: agents.md
  - Goals: goals.md
  - Architecture: architecture.md
  - Development: development.md
  - Release notes: release-notes.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true

strict: true
