[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "caretaker"
version = "0.1.0"
description = "Autonomous GitHub repository maintenance powered by Copilot"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Caretaker Contributors" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
    "httpx>=0.27,<1",
    "pyyaml>=6,<7",
    "click>=8,<9",
    "pydantic>=2,<3",
    "anthropic>=0.40,<1",
    "packaging>=24,<25",
]

[project.optional-dependencies]
dev = [
    "pytest>=8,<9",
    "pytest-asyncio>=0.24,<1",
    "pytest-cov>=5,<6",
    "ruff>=0.7,<1",
    "mypy>=1.13,<2",
    "respx>=0.22,<1",
]

[project.scripts]
caretaker = "caretaker.cli:main"

[project.urls]
Homepage = "https://github.com/your-org/caretaker"
Repository = "https://github.com/your-org/caretaker"
Issues = "https://github.com/your-org/caretaker/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/caretaker"]

[tool.hatch.build.targets.sdist]
include = [
    "src/",
    "dist/",
    "schema/",
    "releases.json",
    "README.md",
    "LICENSE",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "SIM", "TCH"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
