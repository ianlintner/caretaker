# ──────────────────────────────────────────────────────────────────────────────
# Caretaker — canonical workflow template
# Copy to .github/workflows/maintainer.yml in your repository.
# Generated by: caretaker init-workflow
# Docs: https://github.com/ianlintner/caretaker
# ──────────────────────────────────────────────────────────────────────────────
#
# PERMISSION NOTES
# ─────────────────
# contents: write       — caretaker opens PRs and creates branches
# issues: write         — caretaker creates and labels issues
# pull-requests: write  — caretaker comments on and merges PRs
# checks: write         — caretaker posts check-run summaries (required!)
# security-events: read — scope-gap reporter (silence false 403 escalations)
# actions: write        — pr_ci_approver approves action_required runs
# id-token: write       — (optional) OIDC trusted publishing flow
#
# TRIGGER NOTES
# ─────────────
# pull_request types include ready_for_review so draft→ready transitions
# fire pr_reviewer. Without this, Copilot-bot drafts are never reviewed.

name: Caretaker Maintainer

on:
  schedule:
    # Run every 15 minutes (adjust to taste; minimum practical is 5 min)
    - cron: "*/15 * * * *"

  # Allows manual runs from the Actions tab — useful for ad-hoc mode runs
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode (full | pr-only | issue-only | upgrade | security | deps | stale)"
        required: false
        default: "full"

  # Required for pr_reviewer to catch draft→ready transitions
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  # Fire for issue events (triage, labeling, stale detection)
  issues:
    types:
      - opened
      - labeled
      - reopened

concurrency:
  # Serialise runs on the same ref so state writes don't race
  group: caretaker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write         # open PRs / create branches
  issues: write           # create + label issues
  pull-requests: write    # comment + merge PRs
  checks: write           # post check-run summaries (caretaker 403s without this)
  security-events: read   # read security alerts for scope-gap reporter
  actions: write          # pr_ci_approver: approve action_required runs
  # id-token: write       # uncomment if using OIDC trusted publishing

jobs:
  caretaker:
    name: Caretaker (${{ github.event_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # A bot token (PAT or GitHub App token) allows caretaker to push
          # branches and open PRs. GITHUB_TOKEN works but can't trigger
          # downstream workflows (GitHub design limitation).
          token: ${{ secrets.CARETAKER_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install caretaker
        run: |
          pip install --upgrade pip
          pip install caretaker

      # ── Scheduled / manual full run ───────────────────────────────────────
      - name: Run caretaker (scheduled / manual)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          # LLM provider secrets — include the ones you use; leave others blank
          # Azure AI Foundry (recommended)
          AZURE_AI_API_KEY: ${{ secrets.AZURE_AI_API_KEY }}
          AZURE_AI_API_BASE: ${{ secrets.AZURE_AI_API_BASE }}
          AZURE_AI_API_VERSION: ${{ secrets.AZURE_AI_API_VERSION }}
          # OpenAI (alternative)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Anthropic / Claude (alternative)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # GitHub token (passed explicitly so caretaker can use it)
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          caretaker run \
            --config .github/maintainer/config.yml \
            --mode "${{ github.event.inputs.mode || 'full' }}" \
            --report-file caretaker-report.json

      # ── PR event run ──────────────────────────────────────────────────────
      - name: Run caretaker (pull_request event)
        if: github.event_name == 'pull_request'
        env:
          AZURE_AI_API_KEY: ${{ secrets.AZURE_AI_API_KEY }}
          AZURE_AI_API_BASE: ${{ secrets.AZURE_AI_API_BASE }}
          AZURE_AI_API_VERSION: ${{ secrets.AZURE_AI_API_VERSION }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          CARETAKER_EVENT_TYPE: pull_request
          CARETAKER_EVENT_PAYLOAD: ${{ toJson(github.event) }}
        run: |
          caretaker run \
            --config .github/maintainer/config.yml \
            --mode pr-only \
            --event-type pull_request \
            --event-payload "$CARETAKER_EVENT_PAYLOAD" \
            --report-file caretaker-report.json

      # ── Issue event run ───────────────────────────────────────────────────
      - name: Run caretaker (issues event)
        if: github.event_name == 'issues'
        env:
          AZURE_AI_API_KEY: ${{ secrets.AZURE_AI_API_KEY }}
          AZURE_AI_API_BASE: ${{ secrets.AZURE_AI_API_BASE }}
          AZURE_AI_API_VERSION: ${{ secrets.AZURE_AI_API_VERSION }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          CARETAKER_EVENT_PAYLOAD: ${{ toJson(github.event) }}
        run: |
          caretaker run \
            --config .github/maintainer/config.yml \
            --mode issue-only \
            --event-type issues \
            --event-payload "$CARETAKER_EVENT_PAYLOAD" \
            --report-file caretaker-report.json

      # ── Upload run report (always, for debugging) ─────────────────────────
      - name: Upload caretaker report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: caretaker-report-${{ github.run_number }}
          path: caretaker-report.json
          if-no-files-found: ignore
          retention-days: 30
